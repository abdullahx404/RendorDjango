<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BlogSite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4 mb-4">
  <a class="navbar-brand" href="/">BlogSite</a>

  <div class="d-flex align-items-center gap-2">

    {% if user.is_authenticated %}
      <!-- ── Shown only to logged-in users ── -->
      <span class="text-white" style="font-size:14px">
        Hello, <strong>{{ user.username }}</strong>
      </span>
      <a class="btn btn-outline-light btn-sm" href="/create/">+ New Post</a>

      <!-- Logout uses a POST form for security (GET logout is unsafe) -->
      <form method="POST" action="{% url 'logout' %}" class="m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
      </form>

    {% else %}
      <!-- ── Shown only to anonymous visitors ── -->
      <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>

    {% endif %}

  </div>
</nav>

<div class="container">
  {% block content %}
  
  
  {% endblock %}
</div>
</body>
</html>
